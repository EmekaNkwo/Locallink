name: Android Release

# Builds a signed Android APK + AAB without EAS, using `expo prebuild` + Gradle.
#
# Trigger:
#   - Pushes to `main` or `master` (including merged PRs) build signed release artifacts.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   ANDROID_KEYSTORE_BASE64    base64 of your upload keystore (.jks/.keystore)
#   ANDROID_KEYSTORE_PASSWORD  keystore (store) password
#   ANDROID_KEY_ALIAS          key alias inside the keystore
#   ANDROID_KEY_PASSWORD       key password for that alias
#
# Generate a keystore once locally:
#   keytool -genkeypair -v -keystore release.keystore -alias locallink \
#     -keyalg RSA -keysize 2048 -validity 10000
# Then base64-encode it for the secret:
#   base64 -w0 release.keystore   (Linux)   |   base64 -i release.keystore   (macOS)

on:
  push:
    branches: [main, master]

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      BUILD_FORMAT: both

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.x
          cache: npm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform & build-tools
        run: |
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools"

      - name: Install dependencies
        run: npm ci

      - name: Resolve version metadata
        id: version
        run: |
          # versionCode is monotonic per run; versionName comes from app.json.
          VERSION_CODE="${GITHUB_RUN_NUMBER}"
          VERSION_NAME="$(node -p "require('./app.json').expo.version")"
          echo "code=${VERSION_CODE}" >> "$GITHUB_OUTPUT"
          echo "name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"
          echo "Building versionName=${VERSION_NAME} versionCode=${VERSION_CODE}"

      - name: Apply version to app.json
        env:
          VERSION_CODE: ${{ steps.version.outputs.code }}
          VERSION_NAME: ${{ steps.version.outputs.name }}
        run: |
          node -e "
            const fs = require('fs');
            const path = 'app.json';
            const cfg = JSON.parse(fs.readFileSync(path, 'utf8'));
            cfg.expo.version = process.env.VERSION_NAME;
            cfg.expo.android = cfg.expo.android || {};
            cfg.expo.android.versionCode = Number(process.env.VERSION_CODE);
            fs.writeFileSync(path, JSON.stringify(cfg, null, 2) + '\n');
          "

      - name: Prebuild (generate android project)
        run: npx expo prebuild --platform android --no-install

      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is not set. Cannot produce a signed release."
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/release.keystore

      - name: Build release artifacts
        working-directory: android
        env:
          ORG_GRADLE_PROJECT_LOCALLINK_UPLOAD_STORE_FILE: ${{ github.workspace }}/android/app/release.keystore
          ORG_GRADLE_PROJECT_LOCALLINK_UPLOAD_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ORG_GRADLE_PROJECT_LOCALLINK_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ORG_GRADLE_PROJECT_LOCALLINK_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          TASKS=""
          case "$BUILD_FORMAT" in
            apk) TASKS=":app:assembleRelease" ;;
            aab) TASKS=":app:bundleRelease" ;;
            *)   TASKS=":app:assembleRelease :app:bundleRelease" ;;
          esac
          ./gradlew $TASKS --no-daemon --stacktrace

      - name: Collect artifacts
        id: collect
        run: |
          mkdir -p dist
          VERSION="${{ steps.version.outputs.name }}"
          APK="android/app/build/outputs/apk/release/app-release.apk"
          AAB="android/app/build/outputs/bundle/release/app-release.aab"
          if [ -f "$APK" ]; then cp "$APK" "dist/locallink-${VERSION}.apk"; fi
          if [ -f "$AAB" ]; then cp "$AAB" "dist/locallink-${VERSION}.aab"; fi
          ls -lh dist

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: locallink-android-${{ steps.version.outputs.name }}
          path: dist/*
          if-no-files-found: error
          retention-days: 30

